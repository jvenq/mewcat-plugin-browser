<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gRPC/Connect RPC 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 30px;
        }

        .config-section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f7f9fc;
            border-radius: 10px;
        }

        .config-section h3 {
            margin-bottom: 15px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            font-family: 'Courier New', monospace;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        .output-section {
            margin-top: 30px;
            padding: 20px;
            background: #1e1e1e;
            border-radius: 10px;
            color: #d4d4d4;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .output-section h3 {
            color: #fff;
            margin-bottom: 15px;
        }

        .log-entry {
            margin-bottom: 8px;
            padding: 8px;
            border-radius: 4px;
        }

        .log-info {
            color: #4fc3f7;
        }

        .log-success {
            color: #81c784;
        }

        .log-error {
            color: #e57373;
        }

        .log-warn {
            color: #ffb74d;
        }

        .loader {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        .status-idle {
            background: #e1e8ed;
            color: #5a6268;
        }

        .status-running {
            background: #fff3cd;
            color: #856404;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 gRPC/Connect RPC 测试工具</h1>
            <p>测试 ChatService API 调用</p>
        </div>

        <div class="content">
            <!-- 配置区域 -->
            <div class="config-section">
                <h3>⚙️ 配置</h3>
                <div class="form-group">
                    <label>API 端点</label>
                    <input type="text" id="baseUrl" value="https://api-dev.doc2x.noedgeai.com" placeholder="https://api-dev.doc2x.noedgeai.com">
                </div>
                <div class="form-group">
                    <label>模型选择</label>
                    <select id="model">
                        <option value="0">UNSPECIFIED</option>
                        <option value="21" selected>DEEPSEEK_CHAT</option>
                        <option value="14">GLM4_PLUS</option>
                        <option value="71">DOUBAO_1d5_PRO</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>温度 (Temperature)</label>
                    <input type="number" id="temperature" value="0.1" min="0" max="2" step="0.1">
                </div>
            </div>

            <!-- 测试 Completion -->
            <div class="config-section">
                <h3>💬 Completion 测试</h3>
                <div class="form-group">
                    <label>系统提示词</label>
                    <textarea id="systemPrompt" placeholder="系统角色描述...">你是一个专业的翻译助手</textarea>
                </div>
                <div class="form-group">
                    <label>用户消息</label>
                    <textarea id="userMessage" placeholder="要处理的文本...">请将以下文本翻译成中文：Hello, how are you today?</textarea>
                </div>
                <div class="button-group">
                    <button class="btn-primary" id="testCompletion" onclick="runCompletionTest()">
                        <span id="completionLoader"></span>
                        <span>🔄 测试 Completion</span>
                    </button>
                </div>
            </div>

            <!-- 测试 CommonTranslate -->
            <div class="config-section">
                <h3>🌐 CommonTranslate 测试</h3>
                <div class="form-group">
                    <label>待翻译文本（每行一个）</label>
                    <textarea id="translateTexts" placeholder="每行一个文本...">Hello world
Good morning
Thank you very much</textarea>
                </div>
                <div class="form-group">
                    <label>目标语言</label>
                    <input type="text" id="targetLang" value="中文" placeholder="中文">
                </div>
                <div class="button-group">
                    <button class="btn-primary" id="testTranslate" onclick="runTranslateTest()">
                        <span id="translateLoader"></span>
                        <span>🌍 测试翻译</span>
                    </button>
                    <button class="btn-secondary" onclick="clearOutput()">🗑️ 清空输出</button>
                </div>
            </div>

            <!-- 输出区域 -->
            <div class="output-section">
                <h3>📋 输出日志 <span id="statusBadge" class="status-badge status-idle">空闲</span></h3>
                <div id="output"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { create } from 'https://esm.sh/@bufbuild/protobuf@2.9.0';
        import { createClient } from 'https://esm.sh/@connectrpc/connect@2.1.0';
        import { createConnectTransport } from 'https://esm.sh/@connectrpc/connect-web@2.1.0';

        // 这里需要导入你的 proto 定义
        // 由于浏览器环境限制，我们使用动态导入
        let ChatService, CompletionReqSchema, CommonMessageSchema, CommonTranslateReqSchema, LLMModel;

        window.logMessage = function(message, type = 'info') {
            const output = document.getElementById('output');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            output.appendChild(entry);
            output.scrollTop = output.scrollHeight;
        }

        window.clearOutput = function() {
            document.getElementById('output').innerHTML = '';
            updateStatus('idle');
        }

        function updateStatus(status) {
            const badge = document.getElementById('statusBadge');
            badge.className = `status-badge status-${status}`;
            badge.textContent = status === 'idle' ? '空闲' :
                                status === 'running' ? '运行中' :
                                status === 'success' ? '成功' : '失败';
        }

        window.runCompletionTest = async function() {
            const btn = document.getElementById('testCompletion');
            const loader = document.getElementById('completionLoader');

            try {
                btn.disabled = true;
                loader.innerHTML = '<span class="loader"></span>';
                updateStatus('running');
                clearOutput();

                logMessage('🚀 开始 Completion 测试...', 'info');

                const baseUrl = document.getElementById('baseUrl').value;
                const systemPrompt = document.getElementById('systemPrompt').value;
                const userMessage = document.getElementById('userMessage').value;
                const model = parseInt(document.getElementById('model').value);
                const temperature = parseFloat(document.getElementById('temperature').value);

                logMessage(`📡 连接到: ${baseUrl}`, 'info');

                // 使用 fetch 进行简单测试
                const response = await fetch(`${baseUrl}/schema.ChatService/Completion`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uid: 'test-' + Date.now(),
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: userMessage }
                        ],
                        modelOption: {
                            model: model,
                            tryCnt: 1
                        },
                        temperature: temperature
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                logMessage('✅ 收到响应', 'success');
                logMessage(`📝 内容: ${data.content || '(空)'}`, 'success');
                logMessage(`📊 Prompt tokens: ${data.promptTokens || 0}`, 'info');
                logMessage(`📊 Completion tokens: ${data.completionTokens || 0}`, 'info');

                updateStatus('success');
            } catch (error) {
                logMessage(`❌ 错误: ${error.message}`, 'error');
                updateStatus('error');
            } finally {
                btn.disabled = false;
                loader.innerHTML = '';
            }
        }

        window.runTranslateTest = async function() {
            const btn = document.getElementById('testTranslate');
            const loader = document.getElementById('translateLoader');

            try {
                btn.disabled = true;
                loader.innerHTML = '<span class="loader"></span>';
                updateStatus('running');
                clearOutput();

                logMessage('🌐 开始翻译测试...', 'info');

                const baseUrl = document.getElementById('baseUrl').value;
                const textsInput = document.getElementById('translateTexts').value;
                const texts = textsInput.split('\n').filter(t => t.trim());
                const targetLang = document.getElementById('targetLang').value;
                const model = parseInt(document.getElementById('model').value);

                logMessage(`📡 连接到: ${baseUrl}`, 'info');
                logMessage(`📝 翻译 ${texts.length} 个文本`, 'info');

                const response = await fetch(`${baseUrl}/v1/chat/common_translate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        uid: 'translate-' + Date.now(),
                        texts: texts,
                        promptBuilder: {
                            method: 0,
                            targetLang: targetLang,
                            maskFormulas: false
                        },
                        controlOption: {
                            modelOption: [{
                                model: model,
                                tryCnt: 1
                            }],
                            groupMaxTokens: 8000,
                            concurrentCnt: 1
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                logMessage('✅ 翻译完成', 'success');

                if (data.texts && data.texts.length > 0) {
                    data.texts.forEach((item, idx) => {
                        logMessage(`  [${idx + 1}] ${item.text}`, 'success');
                    });
                }

                updateStatus('success');
            } catch (error) {
                logMessage(`❌ 翻译错误: ${error.message}`, 'error');
                updateStatus('error');
            } finally {
                btn.disabled = false;
                loader.innerHTML = '';
            }
        }

        // 初始化
        logMessage('⚡ 测试工具已就绪', 'success');
    </script>
</body>
</html>
